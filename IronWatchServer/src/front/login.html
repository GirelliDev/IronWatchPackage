<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>IronWatch - Login</title>

    <link rel="shortcut icon"
        href="https://github.com/GirelliDev/GirelliDev-Assets/blob/main/ADMIN-removebg-preview.png?raw=true"
        type="image/x-icon">

    <style>
        :root {
            --primary: #e10600;
            --primary-glow: rgba(225, 6, 0, 0.35);
            --bg: radial-gradient(circle at 20% 20%, #1a1a1a, #0b0b0b 60%);
            --card: #141414;
            --card-light: #1b1b1b;
            --border: #2a2a2a;
            --border-focus: #e10600;
            --text: #ffffff;
            --muted: #9a9a9a;
            --radius: 20px;
            --transition: 0.25s cubic-bezier(.4, 0, .2, 1);
        }

        /* BLOQUEIO DE SELEÇÃO DE TEXTO */
        body,
        .login-card h1,
        .input-group label,
        button {
            user-select: none;
            /* Impede seleção de texto */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text);
            padding: 1rem;
        }

        .login-card {
            background: linear-gradient(145deg, var(--card), #0f0f0f);
            padding: clamp(40px, 6vw, 80px);
            border-radius: var(--radius);

            width: min(90vw, 600px);
            /* cresce até 600px */
            min-height: 480px;
            /* força altura mínima */

            border: 1px solid var(--border);
            box-shadow:
                0 20px 60px rgba(0, 0, 0, 0.7),
                0 0 0 1px rgba(255, 255, 255, 0.02) inset;

            position: relative;

            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .login-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            height: 3px;
            width: 100%;
            /* background: var(--primary); não gostei */

            border-top-left-radius: var(--radius);
            border-top-right-radius: var(--radius);
        }

        .login-header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: clamp(25px, 5vw, 40px);
        }

        .login-logo {
            width: clamp(40px, 8vw, 60px);
        }

        .login-header h1 {
            color: var(--primary);
            font-size: clamp(20px, 5vw, 28px);
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .input-group {
            position: relative;
            margin-bottom: clamp(20px, 4vw, 30px);
        }

        .input-group input {
            width: 100%;
            padding: 16px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--card-light);
            color: var(--text);
            font-size: 15px;
            outline: none;
            transition: var(--transition);
        }

        .input-group input:hover {
            border-color: #3a3a3a;
        }

        .input-group input:focus {
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px var(--primary-glow);
        }

        .input-group label {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            font-size: 14px;
            pointer-events: none;
            transition: var(--transition);
        }

        .input-group input:focus+label,
        .input-group input:not(:placeholder-shown)+label {
            top: -10px;
            font-size: 12px;
            color: var(--primary);
        }

        button {
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            font-size: 15px;
            letter-spacing: 1px;
            cursor: pointer;
            background: linear-gradient(90deg, var(--primary), #b00000);
            color: white;
            transition: var(--transition);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px var(--primary-glow);
        }

        button:active {
            transform: translateY(0);
        }

        .error-message {
            margin-top: 20px;
            text-align: center;
            color: var(--primary);
            font-size: 14px;
        }

        /* RESPONSIVIDADE */

        @media (max-width: 480px) {
            body {
                align-items: flex-start;
                padding-top: 40px;
            }

            .login-card {
                border-radius: 16px;
            }
        }

        @media (min-width: 1200px) {
            .login-card {
                max-width: 500px;
            }
        }
    </style>
</head>

<body>

    <div class="login-card">

        <div class="login-header">
            <img src="https://github.com/GirelliDev/GirelliDev-Assets/blob/main/ADMIN-removebg-preview.png?raw=true"
                alt="IronWatch" class="login-logo">
            <h1>IronWatch</h1>
        </div>

        <form method="post" action="/login">

            <div class="input-group">
                <input type="text" name="username" required placeholder=" ">
                <label>Usuário</label>
            </div>

            <div class="input-group">
                <input type="password" name="password" required placeholder=" ">
                <label>Senha</label>
            </div>

            <button type="submit">Entrar</button>

        </form>

        <p class="error-message"></p>

    </div>

</body>

</html>
